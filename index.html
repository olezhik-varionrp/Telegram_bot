<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VarionRP Media</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g1' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff006e'/%3E%3Cstop offset='0.5' stop-color='%238338ec'/%3E%3Cstop offset='1' stop-color='%2300f5ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='12' fill='%230a0a0f'/%3E%3Crect x='2' y='2' width='60' height='60' rx='11' fill='none' stroke='url(%23g1)' stroke-width='2'/%3E%3Ctext x='32' y='26' font-family='Arial Black,Arial' font-size='16' font-weight='900' fill='%23ff006e' text-anchor='middle'%3EVARION%3C/text%3E%3Ctext x='32' y='46' font-family='Arial Black,Arial' font-size='20' font-weight='900' fill='%2300f5ff' text-anchor='middle'%3ERP%3C/text%3E%3Crect x='8' y='50' width='48' height='2' rx='1' fill='url(%23g1)'/%3E%3C/svg%3E">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --neon-pink: #ff006e;
  --neon-blue: #00f5ff;
  --neon-purple: #8338ec;
  --neon-green: #39ff14;
  --dark: #050508;
  --dark2: #0d0d15;
  --dark3: #13131f;
  --dark4: #1a1a2e;
  --text: #e8e8ff;
  --text-dim: #6060a0;
  --gold: #ffd700;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow-x:hidden; }
body { background:var(--dark); color:var(--text); font-family:'Rajdhani',sans-serif; }

/* Animated BG */
.bg {
  position:fixed; inset:0; z-index:0;
  background: radial-gradient(ellipse at 15% 15%, rgba(255,0,110,0.12) 0%, transparent 50%),
              radial-gradient(ellipse at 85% 85%, rgba(0,245,255,0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 50%, rgba(131,56,236,0.06) 0%, transparent 60%);
  animation: bgAnim 10s ease-in-out infinite alternate;
}
@keyframes bgAnim {
  0% { filter:hue-rotate(0deg); }
  100% { filter:hue-rotate(30deg); }
}
.grid {
  position:fixed; inset:0; z-index:0;
  background-image:
    linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
  background-size:30px 30px;
  animation:gridScroll 15s linear infinite;
}
@keyframes gridScroll { to { background-position:30px 30px; } }

/* Scanlines */
.scanlines {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
}

.wrap { position:relative; z-index:1; max-width:480px; margin:0 auto; padding-bottom:80px; }

/* Header */
.hdr {
  background:rgba(5,5,8,0.95);
  border-bottom:1px solid rgba(0,245,255,0.2);
  padding:14px 16px;
  position:sticky; top:0; z-index:50;
  backdrop-filter:blur(20px);
}
.hdr-in { display:flex; align-items:center; gap:12px; }
.logo {
  width:42px; height:42px; border-radius:8px;
  background:var(--dark3);
  border:1.5px solid transparent;
  background-clip:padding-box;
  position:relative; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
.logo::before {
  content:''; position:absolute; inset:-1.5px;
  background:linear-gradient(135deg,var(--neon-pink),var(--neon-purple),var(--neon-blue));
  border-radius:9px; z-index:-1;
  animation:logoBorder 3s linear infinite;
}
@keyframes logoBorder { to { filter:hue-rotate(360deg); } }
.logo-text { font-family:'Oswald',sans-serif; font-size:16px; font-weight:700; line-height:1; text-align:center; }
.logo-v { color:var(--neon-pink); display:block; font-size:18px; }
.logo-rp { color:var(--neon-blue); display:block; font-size:11px; letter-spacing:2px; }
.hdr-info h1 { font-family:'Oswald',sans-serif; font-size:17px; font-weight:700; letter-spacing:2px; text-transform:uppercase; background:linear-gradient(90deg,var(--neon-pink),var(--neon-blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.hdr-info p { font-size:10px; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; margin-top:1px; }
.hdr-live { margin-left:auto; font-size:10px; font-weight:700; letter-spacing:1px; padding:3px 8px; border-radius:4px; background:rgba(57,255,20,0.1); border:1px solid rgba(57,255,20,0.4); color:var(--neon-green); animation:livePulse 2s ease-in-out infinite; }
@keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* Nav */
.nav { display:flex; background:var(--dark2); border-bottom:1px solid rgba(0,245,255,0.08); }
.nb {
  flex:1; padding:11px 0; background:none; border:none; color:var(--text-dim);
  font-family:'Oswald',sans-serif; font-size:12px; font-weight:600; letter-spacing:1.5px;
  text-transform:uppercase; cursor:pointer; border-bottom:2px solid transparent; transition:all .3s;
}
.nb.active { color:var(--neon-blue); border-bottom-color:var(--neon-blue); text-shadow:0 0 10px rgba(0,245,255,0.5); }

/* Pages */
.page { display:none; padding:16px; }
.page.active { display:block; }

/* Section */
.stitle {
  font-family:'Oswald',sans-serif; font-size:20px; font-weight:700; letter-spacing:3px;
  text-transform:uppercase; margin-bottom:2px;
  background:linear-gradient(90deg,var(--neon-pink),var(--neon-purple),var(--neon-blue));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  display:flex; align-items:center; gap:8px;
}
.stitle::before { content:''; width:3px; height:22px; background:linear-gradient(180deg,var(--neon-pink),var(--neon-blue)); border-radius:2px; flex-shrink:0; -webkit-text-fill-color:unset; }
.ssub { font-size:11px; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; margin-bottom:20px; padding-left:11px; }

/* Form */
.fg { margin-bottom:14px; }
.fl {
  display:flex; align-items:center; gap:6px;
  font-family:'Oswald',sans-serif; font-size:11px; font-weight:600; color:var(--neon-blue);
  letter-spacing:1.5px; text-transform:uppercase; margin-bottom:6px;
}
.fn { width:17px; height:17px; background:rgba(0,245,255,0.15); border:1px solid rgba(0,245,255,0.3); color:var(--neon-blue); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; flex-shrink:0; }
.fi, .fta {
  width:100%; background:var(--dark3); border:1px solid rgba(0,245,255,0.12);
  border-radius:6px; padding:11px 13px; color:var(--text);
  font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:500;
  outline:none; -webkit-appearance:none; transition:all .3s;
}
.fi:focus, .fta:focus { border-color:var(--neon-blue); background:var(--dark4); box-shadow:0 0 0 3px rgba(0,245,255,0.08), inset 0 0 20px rgba(0,245,255,0.03); }
.fi::placeholder, .fta::placeholder { color:var(--text-dim); font-size:13px; }
.fta { resize:none; height:85px; line-height:1.5; }
.div { height:1px; background:linear-gradient(90deg,transparent,rgba(0,245,255,0.15),transparent); margin:16px 0; }

/* Submit */
.bsub {
  width:100%; padding:15px; border:none; border-radius:6px; cursor:pointer;
  font-family:'Oswald',sans-serif; font-size:15px; font-weight:700; letter-spacing:3px;
  text-transform:uppercase; margin-top:6px; position:relative; overflow:hidden;
  background:linear-gradient(135deg,var(--neon-pink),var(--neon-purple),var(--neon-blue));
  color:#fff; transition:all .3s;
}
.bsub::before { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.2); opacity:0; transition:opacity .3s; }
.bsub:hover::before { opacity:1; }
.bsub:hover { transform:translateY(-1px); box-shadow:0 8px 30px rgba(255,0,110,0.4), 0 0 60px rgba(0,245,255,0.2); }
.bsub:active { transform:translateY(0); }
.bsub:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

/* Status cards */
.sc {
  background:var(--dark3); border-radius:10px; padding:16px; margin-bottom:10px;
  border:1px solid rgba(0,245,255,0.08); position:relative; overflow:hidden;
  animation:cardIn .4s ease forwards; opacity:0; transform:translateY(16px);
}
@keyframes cardIn { to { opacity:1; transform:translateY(0); } }
.sc::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; }
.sc.pending::before { background:linear-gradient(180deg,var(--neon-blue),var(--neon-purple)); }
.sc.accepted::before { background:linear-gradient(180deg,var(--neon-green),#00cc00); }
.sc.rejected::before { background:linear-gradient(180deg,var(--neon-pink),#cc0000); }
.sc-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.sc-id { font-family:'Oswald',sans-serif; font-size:12px; color:var(--text-dim); letter-spacing:1px; }
.badge { padding:3px 10px; border-radius:4px; font-family:'Oswald',sans-serif; font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
.badge.pending { background:rgba(0,245,255,0.1); color:var(--neon-blue); border:1px solid rgba(0,245,255,0.25); }
.badge.accepted { background:rgba(57,255,20,0.1); color:var(--neon-green); border:1px solid rgba(57,255,20,0.25); }
.badge.rejected { background:rgba(255,0,110,0.1); color:var(--neon-pink); border:1px solid rgba(255,0,110,0.25); }
.sc-ch { font-family:'Oswald',sans-serif; font-size:17px; font-weight:600; color:var(--text); margin-bottom:3px; }
.sc-dt { font-size:11px; color:var(--text-dim); }

/* Admin cards */
.ac {
  background:var(--dark3); border:1px solid rgba(0,245,255,0.08); border-radius:10px;
  padding:14px; margin-bottom:8px; cursor:pointer; transition:all .3s;
  animation:cardIn .4s ease forwards; opacity:0;
}
.ac:hover { border-color:rgba(0,245,255,0.25); background:var(--dark4); }
.ac-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.ac-user { font-family:'Oswald',sans-serif; font-size:14px; font-weight:600; color:var(--neon-blue); }
.ac-info { font-size:12px; color:var(--text-dim); margin-bottom:8px; }
.ac-acts { display:flex; gap:8px; }
.bacc, .brej {
  flex:1; padding:8px; border-radius:5px; font-family:'Oswald',sans-serif;
  font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase;
  cursor:pointer; transition:all .2s; border:none;
}
.bacc { background:rgba(57,255,20,0.1); color:var(--neon-green); border:1px solid rgba(57,255,20,0.3); }
.bacc:hover { background:rgba(57,255,20,0.25); box-shadow:0 0 15px rgba(57,255,20,0.2); }
.brej { background:rgba(255,0,110,0.1); color:var(--neon-pink); border:1px solid rgba(255,0,110,0.3); }
.brej:hover { background:rgba(255,0,110,0.25); box-shadow:0 0 15px rgba(255,0,110,0.2); }

/* Modal */
.modal { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); }
.modal.active { display:flex; align-items:flex-end; }
.mc { width:100%; max-height:88vh; background:var(--dark2); border-top:2px solid; border-image:linear-gradient(90deg,var(--neon-pink),var(--neon-blue)) 1; border-radius:16px 16px 0 0; padding:16px; overflow-y:auto; animation:slideUp .3s ease; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.mh { width:36px; height:3px; background:rgba(0,245,255,0.2); border-radius:2px; margin:0 auto 16px; }
.dr { display:flex; gap:10px; margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid rgba(0,245,255,0.06); }
.dl { font-family:'Oswald',sans-serif; font-size:10px; color:var(--neon-blue); letter-spacing:1px; text-transform:uppercase; min-width:70px; padding-top:2px; }
.dv { font-size:13px; color:var(--text); flex:1; word-break:break-all; }

/* Empty */
.empty { text-align:center; padding:50px 20px; color:var(--text-dim); }
.ei { font-size:42px; margin-bottom:12px; opacity:0.4; }
.et { font-family:'Oswald',sans-serif; font-size:14px; letter-spacing:2px; text-transform:uppercase; }

/* Toast */
.toast {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(80px);
  background:var(--dark3); border:1px solid rgba(0,245,255,0.3); color:var(--neon-blue);
  padding:10px 20px; border-radius:6px; font-family:'Oswald',sans-serif; font-size:12px;
  letter-spacing:1px; text-transform:uppercase; z-index:300; transition:transform .3s; white-space:nowrap;
  box-shadow:0 0 20px rgba(0,245,255,0.2);
}
.toast.show { transform:translateX(-50%) translateY(0); }

/* Loading */
.ld { display:flex; align-items:center; justify-content:center; gap:5px; padding:40px; color:var(--text-dim); font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:2px; }
.ld-d { width:5px; height:5px; background:var(--neon-blue); border-radius:50%; animation:ldot 1.2s ease-in-out infinite; }
.ld-d:nth-child(2){animation-delay:.2s} .ld-d:nth-child(3){animation-delay:.4s}
@keyframes ldot { 0%,80%,100%{transform:scale(0.5);opacity:0.3} 40%{transform:scale(1);opacity:1} }

/* Filter tabs */
.filters { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
.ftab { padding:5px 12px; border-radius:4px; font-family:'Oswald',sans-serif; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; cursor:pointer; border:1px solid rgba(0,245,255,0.15); background:transparent; color:var(--text-dim); transition:all .2s; }
.ftab.active { background:rgba(0,245,255,0.1); color:var(--neon-blue); border-color:rgba(0,245,255,0.3); }

/* Stats bar */
.stats { display:flex; gap:8px; margin-bottom:16px; }
.stat { flex:1; background:var(--dark3); border-radius:8px; padding:10px; text-align:center; border:1px solid rgba(0,245,255,0.06); }
.stat-n { font-family:'Oswald',sans-serif; font-size:22px; font-weight:700; line-height:1; }
.stat-l { font-size:10px; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; margin-top:3px; }
.stat.total .stat-n { color:var(--neon-blue); }
.stat.pend .stat-n { color:var(--gold); }
.stat.acc .stat-n { color:var(--neon-green); }
.stat.rej .stat-n { color:var(--neon-pink); }
</style>
</head>
<body>
<div class="bg"></div>
<div class="grid"></div>
<div class="scanlines"></div>

<div class="wrap">
  <div class="hdr">
    <div class="hdr-in">
      <div class="logo">
        <div class="logo-text">
          <span class="logo-v">V</span>
          <span class="logo-rp">RP</span>
        </div>
      </div>
      <div class="hdr-info">
        <h1>VarionRP Media</h1>
        <p>Медиа партнёрская программа</p>
      </div>
      <div class="hdr-live">● Live</div>
    </div>
  </div>

  <div class="nav">
    <button class="nb active" onclick="showPage('apply',this)">Заявка</button>
    <button class="nb" onclick="showPage('status',this)">Статус</button>
    <button class="nb" id="adminTab" style="display:none" onclick="showPage('admin',this)">Админ</button>
  </div>

  <!-- Apply -->
  <div class="page active" id="page-apply">
    <br>
    <div class="stitle">Подать заявку</div>
    <div class="ssub">Заполни все поля для рассмотрения</div>
    <form id="applyForm">
      <div class="fg">
        <label class="fl"><span class="fn">1</span>Название канала</label>
        <input class="fi" name="channelName" placeholder="Мой крутой канал" required>
      </div>
      <div class="fg">
        <label class="fl"><span class="fn">2</span>Ссылка на канал</label>
        <input class="fi" name="channelLink" placeholder="https://youtube.com/..." required>
      </div>
      <div class="div"></div>
      <div class="fg">
        <label class="fl"><span class="fn">3</span>Реальное имя</label>
        <input class="fi" name="realName" placeholder="Олег" required>
      </div>
      <div class="fg">
        <label class="fl"><span class="fn">4</span>Возраст</label>
        <input class="fi" name="age" type="number" placeholder="18" min="10" max="99" required>
      </div>
      <div class="fg">
        <label class="fl"><span class="fn">5</span>Стаж на проекте</label>
        <input class="fi" name="playTime" placeholder="2 года" required>
      </div>
      <div class="div"></div>
      <div class="fg">
        <label class="fl"><span class="fn">6</span>О себе и канале</label>
        <textarea class="fta" name="about" placeholder="Расскажи о себе и своём контенте..." required></textarea>
      </div>
      <div class="fg">
        <label class="fl"><span class="fn">7</span>Discord</label>
        <input class="fi" name="discord" placeholder="username#1234" required>
      </div>
      <div class="fg">
        <label class="fl"><span class="fn">8</span>Telegram</label>
        <input class="fi" name="telegram" placeholder="@username" required>
      </div>
      <button type="submit" class="bsub" id="submitBtn">⚡ Отправить заявку</button>
    </form>
  </div>

  <!-- Status -->
  <div class="page" id="page-status">
    <br>
    <div class="stitle">Мои заявки</div>
    <div class="ssub">Статус рассмотрения</div>
    <div id="statusList"><div class="ld"><div class="ld-d"></div><div class="ld-d"></div><div class="ld-d"></div></div></div>
  </div>

  <!-- Admin -->
  <div class="page" id="page-admin">
    <br>
    <div class="stitle">Панель админа</div>
    <div class="ssub">Управление заявками</div>
    <div class="stats" id="adminStats"></div>
    <div class="filters">
      <button class="ftab active" onclick="filterAdmin('all',this)">Все</button>
      <button class="ftab" onclick="filterAdmin('pending',this)">На рассмотрении</button>
      <button class="ftab" onclick="filterAdmin('accepted',this)">Принятые</button>
      <button class="ftab" onclick="filterAdmin('rejected',this)">Отклонённые</button>
    </div>
    <div id="adminList"><div class="ld"><div class="ld-d"></div><div class="ld-d"></div><div class="ld-d"></div></div></div>
  </div>
</div>

<!-- Modal -->
<div class="modal" id="modal" onclick="closeModal(event)">
  <div class="mc">
    <div class="mh"></div>
    <div id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#050508'); tg.setBackgroundColor('#050508'); }

const ADMIN_ID = 6919611704;
const userId = tg?.initDataUnsafe?.user?.id || 0;
const isAdmin = userId === ADMIN_ID;
if (isAdmin) document.getElementById('adminTab').style.display = 'block';

let allApps = [];
let currentFilter = 'all';

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'status') loadStatus();
  if (name === 'admin' && isAdmin) loadAdmin();
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.color = color || 'var(--neon-blue)';
  t.style.borderColor = (color || 'var(--neon-blue)').replace(')',',0.3)').replace('rgb','rgba');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Storage helpers
async function getApps() {
  try {
    const r = await window.storage?.get('varionrp_apps', true);
    return r ? JSON.parse(r.value) : [];
  } catch { return []; }
}

async function saveApps(apps) {
  try { await window.storage?.set('varionrp_apps', JSON.stringify(apps), true); }
  catch(e) { console.error('Storage error:', e); }
}

// Submit
document.getElementById('applyForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '⏳ Отправляем...';

  const fd = new FormData(e.target);
  const app = {
    id: Date.now(),
    userId, username: tg?.initDataUnsafe?.user?.username || 'unknown',
    firstName: tg?.initDataUnsafe?.user?.first_name || '',
    date: new Date().toLocaleString('ru-RU'),
    channelName: fd.get('channelName'), channelLink: fd.get('channelLink'),
    realName: fd.get('realName'), age: fd.get('age'), playTime: fd.get('playTime'),
    about: fd.get('about'), discord: fd.get('discord'), telegram: fd.get('telegram'),
    status: 'pending'
  };

  const apps = await getApps();
  apps.push(app);
  await saveApps(apps);

  if (tg) tg.sendData(JSON.stringify({ type: 'new_application', ...app }));

  btn.disabled = false; btn.textContent = '✅ Заявка отправлена!';
  showToast('✅ Заявка успешно отправлена!', 'var(--neon-green)');
  e.target.reset();
  setTimeout(() => { btn.textContent = '⚡ Отправить заявку'; showPage('status'); }, 2000);
});

// Status page
async function loadStatus() {
  const list = document.getElementById('statusList');
  list.innerHTML = '<div class="ld"><div class="ld-d"></div><div class="ld-d"></div><div class="ld-d"></div></div>';
  const apps = await getApps();
  const mine = apps.filter(a => String(a.userId) === String(userId)).reverse();
  if (!mine.length) { list.innerHTML = '<div class="empty"><div class="ei">📋</div><div class="et">Заявок нет</div></div>'; return; }
  list.innerHTML = mine.map((a,i) => `
    <div class="sc ${a.status}" style="animation-delay:${i*.08}s">
      <div class="sc-hdr"><span class="sc-id">#${String(a.id).slice(-6)}</span><span class="badge ${a.status}">${stxt(a.status)}</span></div>
      <div class="sc-ch">📺 ${a.channelName}</div>
      <div class="sc-dt">📅 ${a.date}</div>
    </div>`).join('');
}

// Admin page
async function loadAdmin() {
  allApps = await getApps();
  renderAdmin();
}

function renderAdmin() {
  const list = document.getElementById('adminList');
  const stats = document.getElementById('adminStats');
  const total = allApps.length;
  const pend = allApps.filter(a=>a.status==='pending').length;
  const acc = allApps.filter(a=>a.status==='accepted').length;
  const rej = allApps.filter(a=>a.status==='rejected').length;

  stats.innerHTML = `
    <div class="stat total"><div class="stat-n">${total}</div><div class="stat-l">Всего</div></div>
    <div class="stat pend"><div class="stat-n">${pend}</div><div class="stat-l">Ожидают</div></div>
    <div class="stat acc"><div class="stat-n">${acc}</div><div class="stat-l">Принято</div></div>
    <div class="stat rej"><div class="stat-n">${rej}</div><div class="stat-l">Отклонено</div></div>`;

  const filtered = currentFilter === 'all' ? allApps : allApps.filter(a => a.status === currentFilter);
  const sorted = [...filtered].reverse();

  if (!sorted.length) { list.innerHTML = '<div class="empty"><div class="ei">📭</div><div class="et">Заявок нет</div></div>'; return; }
  list.innerHTML = sorted.map((a,i) => `
    <div class="ac" style="animation-delay:${i*.06}s" onclick="showDetail(${a.id})">
      <div class="ac-hdr"><span class="ac-user">@${a.username}</span><span class="badge ${a.status}">${stxt(a.status)}</span></div>
      <div class="ac-info">📺 ${a.channelName} · 📅 ${a.date}</div>
      ${a.status==='pending'?`<div class="ac-acts" onclick="event.stopPropagation()">
        <button class="bacc" onclick="updateStatus(${a.id},'accepted')">✅ Принять</button>
        <button class="brej" onclick="updateStatus(${a.id},'rejected')">❌ Отклонить</button>
      </div>`:''}
    </div>`).join('');
}

function filterAdmin(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAdmin();
}

async function updateStatus(id, status) {
  const apps = await getApps();
  const app = apps.find(a => a.id === id);
  if (!app) return;
  app.status = status;
  await saveApps(apps);
  allApps = apps;
  showToast(status==='accepted'?'✅ Заявка принята!':'❌ Заявка отклонена!', status==='accepted'?'var(--neon-green)':'var(--neon-pink)');
  renderAdmin();
  closeModal();

  // Notify bot
  if (tg) tg.sendData(JSON.stringify({ type: 'status_update', appId: id, userId: app.userId, status }));
}

async function showDetail(id) {
  const apps = await getApps();
  const a = apps.find(x => x.id === id);
  if (!a) return;
  document.getElementById('modalBody').innerHTML = `
    <div class="stitle" style="font-size:17px;margin-bottom:14px">Заявка #${String(a.id).slice(-6)}</div>
    <div class="dr"><span class="dl">Статус</span><span class="badge ${a.status}">${stxt(a.status)}</span></div>
    <div class="dr"><span class="dl">Telegram</span><span class="dv">@${a.username}</span></div>
    <div class="dr"><span class="dl">Канал</span><span class="dv">${a.channelName}</span></div>
    <div class="dr"><span class="dl">Ссылка</span><span class="dv">${a.channelLink}</span></div>
    <div class="dr"><span class="dl">Имя</span><span class="dv">${a.realName}</span></div>
    <div class="dr"><span class="dl">Возраст</span><span class="dv">${a.age}</span></div>
    <div class="dr"><span class="dl">Стаж</span><span class="dv">${a.playTime}</span></div>
    <div class="dr"><span class="dl">О себе</span><span class="dv">${a.about}</span></div>
    <div class="dr"><span class="dl">Discord</span><span class="dv">${a.discord}</span></div>
    <div class="dr"><span class="dl">Discord TG</span><span class="dv">${a.telegram}</span></div>
    <div class="dr"><span class="dl">Дата</span><span class="dv">${a.date}</span></div>
    ${a.status==='pending'?`<div class="ac-acts" style="margin-top:14px">
      <button class="bacc" onclick="updateStatus(${a.id},'accepted')">✅ Принять</button>
      <button class="brej" onclick="updateStatus(${a.id},'rejected')">❌ Отклонить</button>
    </div>`:''}`;
  document.getElementById('modal').classList.add('active');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) document.getElementById('modal').classList.remove('active');
}

function stxt(s) { return s==='pending'?'⏳ Ожидает':s==='accepted'?'✅ Принята':'❌ Отклонена'; }
</script>
</body>
</html>
